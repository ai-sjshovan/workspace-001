name: Update PR Branch

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to update from its base branch
        required: true
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  update:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request && startsWith(github.event.comment.body, '/update-branch'))
    runs-on: ubuntu-latest
    steps:
      - name: Read PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('pr_number'))
              : context.payload.issue.number;
            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              core.setFailed('This workflow only updates PR branches in the same repository.');
              return;
            }
            core.setOutput('number', String(prNumber));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('base_ref', pr.base.ref);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge base into PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${{ steps.pr.outputs.base_ref }}"
          git merge --no-edit "origin/${{ steps.pr.outputs.base_ref }}"
          git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body: 'Updated this PR branch with `${{ steps.pr.outputs.base_ref }}`.',
            });

      - name: Comment failure
        if: failure() && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body: 'Could not update this PR branch automatically. Please resolve merge conflicts locally, then push the branch again.',
            });

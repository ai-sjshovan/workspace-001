wayfinder:
  name: Wayfinder
  storage_path: .ai-state/wayfinder/wayfinder.db
  audit_log: logs/wayfinder-audit.log

sources:
  oss-ledger:
    status: enabled
    kind: static_ledger
    path: research/open-source-intel-ledger.yaml
    notes: Curated local ledger with explicit repository inputs and no unattended network dependency.
    risk:
      credentials: none
      terms: reviewed-public-data
      rate_limits: none-local-file
      scraping: none
      pii_user_generated_content: low-curated-public-metadata
      hosted_dependencies: none
  hackernews:
    status: needs-review
    kind: hackernews
    notes: Public Algolia results are useful, but unattended ingest still needs review for UGC handling and query-rate expectations.
    risk:
      credentials: none
      terms: review-required
      rate_limits: review-required
      scraping: api-search
      pii_user_generated_content: medium-user-generated-content
      hosted_dependencies: algolia-hn-api
    queries:
      - label: founder-pain
        query: "SaaS pain points"
        tags: story
        hits_per_page: 10
      - label: idea-validation
        query: "startup idea validation"
        tags: story
        hits_per_page: 10
      - label: competitor-research
        query: "competitor analysis tool"
        tags: story
        hits_per_page: 10
    hits_per_query: 10
  github:
    status: dry-run-only
    kind: github
    notes: Manual dry runs are acceptable, but unattended GitHub API use still needs rate-limit and dependency review.
    risk:
      credentials: optional-token
      terms: review-required
      rate_limits: api-rate-review
      scraping: official-api
      pii_user_generated_content: low-public-repo-metadata
      hosted_dependencies: github-api
    queries:
      - "startup ideas pain points"
      - "market research SaaS ideas"
      - "competitor analysis startup validation"
    per_page: 10

cron:
  enabled: false
  schedule: daily
  token_free: true
  # Leave OS cron disabled until the command below is explicitly approved.
  # python3 -m wayfinder scheduled-ingest

scoring:
  evidence_count_weight: 0.35
  monetization_signal_weight: 0.20
  source_quality_weight: 0.15
  build_fit_weight: 0.15
  freshness_weight: 0.15
